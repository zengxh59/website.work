<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Internal Tools</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      text-align: center;
      padding: 80px 24px 40px;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #f8fafc;
    }

    header p {
      margin-top: 12px;
      font-size: 1.05rem;
      color: #94a3b8;
    }

    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 32px;
      max-width: 780px;
      width: 100%;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 40px 32px;
      text-decoration: none;
      color: inherit;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: #3b82f6;
      box-shadow: 0 12px 32px rgba(59, 130, 246, 0.15);
    }

    .card-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .card:nth-child(1) .card-icon { background: #1e3a5f; }
    .card:nth-child(2) .card-icon { background: #3b1f4a; }

    .card h2 {
      font-size: 1.3rem;
      font-weight: 600;
      color: #f1f5f9;
    }

    .card p {
      font-size: 0.9rem;
      color: #94a3b8;
      line-height: 1.6;
    }

    .card .arrow {
      margin-top: auto;
      font-size: 0.85rem;
      color: #3b82f6;
      font-weight: 500;
    }

    .card.disabled {
      opacity: 0.5;
      cursor: not-allowed;
      pointer-events: none;
    }
    .card.disabled:hover {
      transform: none;
      border-color: #334155;
      box-shadow: none;
    }

    footer {
      text-align: center;
      padding: 32px 24px;
      font-size: 0.8rem;
      color: #475569;
    }
  </style>
</head>
<body>
  <main>
    <div class="cards">
      <a class="card" href="/rtings/">
        <div class="card-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <polyline points="10 9 9 9 8 9"/>
          </svg>
        </div>
        <h2>TVPQ Review</h2>
        <p>电视评测数据管理与评分分析工具，支持跨产品评测指标对比、权重配置和得分模拟。</p>
        <span class="arrow">Enter &rarr;</span>
      </a>

      <div class="card disabled">
        <div class="card-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#c084fc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/>
            <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
          </svg>
        </div>
        <h2>Product Data</h2>
        <p>电视整机产品规格与价格分析工具，支持竞品规格对比、到手价追踪和渠道数据管理。</p>
        <span class="arrow">Coming Soon</span>
      </div>
    </div>
  </main>

  <footer>Internal use only<span style="display:block;margin-top:6px;font-size:0.75rem;color:#64748b;">Deployed: 2026-05-20 14:34 HKT</span></footer>
</body>
</html>
