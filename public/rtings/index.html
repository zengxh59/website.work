  <body>
    <div id="root">
      <div id="fallback" style="display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:sans-serif;color:#6b7280;">
        Loading...
      </div>
    </div>
    <script>
      function showErr(t,e){var d=document.getElementById('fallback');if(d){d.innerHTML='<pre style="color:red;padding:20px;font-size:13px;">['+t+'] '+(e&&e.message||e)+'\\n'+(e&&e.stack||'')+'</pre>';d.style.display='block';}};
      window.onerror=function(m,s,l,c,e){showErr('sync',e);};
      window.addEventListener('unhandledrejection',function(e){showErr('async',e.reason);});
    </script>
  </body>
